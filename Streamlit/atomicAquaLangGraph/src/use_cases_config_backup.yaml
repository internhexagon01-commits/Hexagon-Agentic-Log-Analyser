# NovAtel Log Analysis Use Cases Configuration
# This file defines deterministic mappings from user questions to specific logs and fields
# Format: use_case_name → keywords, log_type, field_index, bit_position (optional), analysis_type

use_cases:
  # ═══════════════════════════════════════════════════════════════════
  # DETECTION / STATUS USE CASES (bit checks)
  # ═══════════════════════════════════════════════════════════════════
  
  jamming_detection:
    keywords:
      - jamming
      - jammer
      - jam
      - jammed
      - jamming detected
      - jamming detection
      - any jamming
      - check jamming
      - detect jamming
    log_type: RXSTATUS
    field_index: 4          # Receiver status word
    bit_position: 9         # Jamming detected bit
    analysis_type: bit_check
    description: "Detect jamming events from RXSTATUS receiver status word"
    unit: null
    
  spoofing_detection:
    keywords:
      - spoofing
      - spoof
      - spoofed
      - fake signal
      - spoofing detected
      - spoofing detection
      - any spoofing
      - check spoofing
      - detect spoofing
    log_type: RXSTATUS
    field_index: 4
    bit_position: 10        # Spoofing detected bit
    analysis_type: bit_check
    description: "Detect spoofing events from RXSTATUS receiver status word"
    unit: null
    
  interference_detection:
    keywords:
      - interference
      - interfere
      - rf interference
      - spectrum
      - interference detected
      - interference detection
      - any interference
      - check interference
      - detect interference
    log_type: ITDETECTSTATUS
    field_index: 2          # Interference status field
    bit_position: 0         # Interference detected bit
    analysis_type: bit_check
    description: "Detect RF interference from ITDETECTSTATUS log"
    unit: null
    
  antenna_error:
    keywords:
      - antenna
      - antenna error
      - antenna issue
      - antenna problem
      - antenna fault
      - antenna status
    log_type: RXSTATUS
    field_index: 4
    bit_position: 5         # Antenna error bit
    analysis_type: bit_check
    description: "Detect antenna errors from RXSTATUS"
    unit: null
    
  # ═══════════════════════════════════════════════════════════════════
  # NUMERIC STATISTICS USE CASES (min/max/avg)
  # ═══════════════════════════════════════════════════════════════════
  
  height_analysis:
    keywords:
      - height
      - altitude
      - elevation
      - vertical
      - height field
      - altitude field
      - minimum height
      - maximum height
      - average height
      - min height
      - max height
      - lowest height
      - highest height
    log_type: BESTPOS
    field_index: 13         # Height field in BESTPOS
    bit_position: null
    analysis_type: numeric_stat
    description: "Analyze height/altitude statistics from BESTPOS"
    unit: "m"
    
  latitude_analysis:
    keywords:
      - latitude
      - lat
      - north
      - south
      - latitude field
      - minimum latitude
      - maximum latitude
      - average latitude
    log_type: BESTPOS
    field_index: 11         # Latitude field
    bit_position: null
    analysis_type: numeric_stat
    description: "Analyze latitude statistics from BESTPOS"
    unit: "degrees"
    
  longitude_analysis:
    keywords:
      - longitude
      - lon
      - long
      - east
      - west
      - longitude field
      - minimum longitude
      - maximum longitude
      - average longitude
    log_type: BESTPOS
    field_index: 12         # Longitude field
    bit_position: null
    analysis_type: numeric_stat
    description: "Analyze longitude statistics from BESTPOS"
    unit: "degrees"
    
  velocity_analysis:
    keywords:
      - velocity
      - speed
      - vel
      - horizontal speed
      - ground speed
      - minimum velocity
      - maximum velocity
      - average velocity
      - min speed
      - max speed
      - fastest
      - slowest
    log_type: BESTVEL
    field_index: 11         # Horizontal speed field
    bit_position: null
    analysis_type: numeric_stat
    description: "Analyze velocity/speed statistics from BESTVEL"
    unit: "m/s"
    
  signal_quality:
    keywords:
      - signal quality
      - signal strength
      - c/no
      - cno
      - carrier
      - signal level
      - carrier to noise
      - minimum signal
      - maximum signal
      - average signal
      - signal statistics
    log_type: TRACKSTAT
    field_index: 11         # C/No field
    bit_position: null
    analysis_type: numeric_stat
    description: "Analyze signal quality (C/No) from TRACKSTAT"
    unit: "dB-Hz"
    
  scintillation_analysis:
    keywords:
      - scintillation
      - scintillating
      - ionospheric
      - signal fade
      - signal variation
      - signal fluctuation
      - signal fading
      - ionospheric scintillation
    log_type: TRACKSTAT
    field_index: 11         # C/No field - scintillation shows as rapid variations
    bit_position: null
    analysis_type: numeric_stat
    description: "Detect scintillation from C/No variations in TRACKSTAT"
    unit: "dB-Hz"
    special_handler: scintillation  # Triggers special interpretation logic
    
  satellites_tracked:
    keywords:
      - satellites tracked
      - satellite count
      - number of satellites
      - sat count
      - tracking satellites
      - minimum satellites
      - maximum satellites
      - average satellites
      - how many satellites
      - satellite number
    log_type: BESTPOS
    field_index: 7          # Number of satellites in solution
    bit_position: null
    analysis_type: numeric_stat
    description: "Analyze number of satellites tracked from BESTPOS"
    unit: "satellites"
    
  # ═══════════════════════════════════════════════════════════════════
  # POSITION ACCURACY USE CASES
  # ═══════════════════════════════════════════════════════════════════
  
  horizontal_accuracy:
    keywords:
      - horizontal accuracy
      - horizontal error
      - horizontal precision
      - position accuracy
      - position error
      - position precision
      - minimum accuracy
      - maximum accuracy
    log_type: BESTPOS
    field_index: 14         # Standard deviation of latitude
    bit_position: null
    analysis_type: numeric_stat
    description: "Analyze horizontal position accuracy from BESTPOS"
    unit: "m"
    
  vertical_accuracy:
    keywords:
      - vertical accuracy
      - vertical error
      - vertical precision
      - height accuracy
      - height error
      - altitude accuracy
    log_type: BESTPOS
    field_index: 15         # Standard deviation of height
    bit_position: null
    analysis_type: numeric_stat
    description: "Analyze vertical position accuracy from BESTPOS"
    unit: "m"
    
  # ═══════════════════════════════════════════════════════════════════
  # TIME-BASED QUERIES (deterministic, no LLM)
  # ═══════════════════════════════════════════════════════════════════
  
  list_logs:
    keywords:
      - list all logs
      - list logs
      - what logs
      - all logs
      - log types
      - how many logs
      - available logs
      - logs in file
      - logs present
      - show logs
      - display logs
    log_type: null
    field_index: null
    bit_position: null
    analysis_type: direct_handler
    handler_name: list_logs
    description: "List all log types in the file"
    unit: null
    
  time_range:
    keywords:
      - time range
      - start time
      - end time
      - duration
      - file time
      - gps time
      - utc time
      - how long
      - start and end
      - time span
      - time period
    log_type: null
    field_index: null
    bit_position: null
    analysis_type: direct_handler
    handler_name: time_range
    description: "Show file time range"
    unit: null
    
  data_gaps:
    keywords:
      - data gap
      - data gaps
      - missing data
      - gaps
      - continuous
      - continuity
      - data loss
      - time gap
      - time gaps
      - missing time
    log_type: null
    field_index: null
    bit_position: null
    analysis_type: direct_handler
    handler_name: data_gaps
    description: "Check for time gaps in data"
    unit: null
    
  # ═══════════════════════════════════════════════════════════════════
  # COMPLEX / LISTING USE CASES (requires LLM interpretation)
  # ═══════════════════════════════════════════════════════════════════
  
  receiver_status_summary:
    keywords:
      - receiver status
      - rx status
      - receiver health
      - system status
      - receiver summary
      - status summary
    log_type: RXSTATUS
    field_index: null
    bit_position: null
    analysis_type: raw_listing
    description: "Summarize receiver status records"
    unit: null
    
  tracking_status_summary:
    keywords:
      - tracking status
      - tracking
      - satellite tracking
      - track
      - tracking summary
    log_type: TRACKSTAT
    field_index: null
    bit_position: null
    analysis_type: raw_listing
    description: "Summarize satellite tracking status"
    unit: null
    
  position_summary:
    keywords:
      - position
      - coordinates
      - location
      - pos
      - position summary
      - coordinate summary
    log_type: BESTPOS
    field_index: null
    bit_position: null
    analysis_type: raw_listing
    description: "Summarize position records"
    unit: null

# ═══════════════════════════════════════════════════════════════════
# FALLBACK MAPPINGS
# ═══════════════════════════════════════════════════════════════════
# If no exact keyword match, use these log type preferences by category

fallback_mappings:
  detection:
    - RXSTATUS
    - ITDETECTSTATUS
    - RXSTATUSEVENT
  
  position:
    - BESTPOS
    - BESTGNSSPOS
    - PSRPOS
  
  velocity:
    - BESTVEL
    - BESTGNSSVEL
    - PSRVEL
  
  signal:
    - TRACKSTAT
    - SATVIS
    - RANGE
  
  time:
    - CLOCKSTEERING
    - TIMESYNC
    - TIME
