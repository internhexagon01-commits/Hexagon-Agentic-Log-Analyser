    - jammer present
    - jamming event
    log_type: RXSTATUS
    field_index: 4
    bit_position: 15
    analysis_type: bit_check
    description: Detect jamming events from RXSTATUS receiver status word (bit 15)
    unit: null
  antenna_error:
    keywords:
    - antenna
