use_cases:
  spoofing_detection:
    keywords:
    - spoofing
    - spoof
    - spoofed
    - fake signal
    - spoofing detected
    - spoofing detection
    - any spoofing
    - check spoofing
    - detect spoofing
    - spoofer present
    - spoofing event
    - spoofing attack
    log_type: RXSTATUS
    field_index: 4
    bit_position: 9
    analysis_type: bit_check
    description: Detect spoofing events from RXSTATUS receiver status word (bit 9)
    unit: null
  jamming_detection:
    keywords:
    - jamming
    - jammer
    - jam
